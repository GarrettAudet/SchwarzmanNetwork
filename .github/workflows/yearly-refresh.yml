name: Yearly Schwarzman Network Refresh

on:
  workflow_dispatch:
    inputs:
      brightdata_limit:
        description: "Optional cap on Bright Data profiles. 0 means all pending LinkedIn URLs."
        required: false
        default: "0"
  schedule:
    - cron: "17 9 15 1 *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Fetch official roster
        run: python -m schwarzman_network.cli fetch-official

      - name: Append net-new scholars
        run: python -m schwarzman_network.cli sync-official

      - name: Search for missing LinkedIn URLs
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CX: ${{ secrets.GOOGLE_CX }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          BING_SEARCH_API_KEY: ${{ secrets.BING_SEARCH_API_KEY }}
        run: python -m schwarzman_network.cli find-linkedin

      - name: Enrich LinkedIn profiles with Bright Data
        env:
          BRIGHT_DATA_API: ${{ secrets.BRIGHT_DATA_API }}
          BRIGHT_DATA_API_KEY: ${{ secrets.BRIGHT_DATA_API_KEY }}
          BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
          BRIGHTDATA_LIMIT: ${{ github.event.inputs.brightdata_limit || '0' }}
        run: |
          if [ -n "$BRIGHT_DATA_API$BRIGHT_DATA_API_KEY$BRIGHTDATA_API_KEY" ]; then
            python -m schwarzman_network.cli enrich-brightdata --limit "$BRIGHTDATA_LIMIT"
          else
            echo "Bright Data secret not configured; skipping Bright Data enrichment."
          fi

      - name: Build processed data and public exports
        run: python -m schwarzman_network.cli refresh

      - name: Commit refreshed data
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh Schwarzman network data"
          file_pattern: data/raw/*.json data/seed/*.csv data/audit/*.csv data/processed/*.csv data/public/*

      - name: Check email configuration
        id: email-config
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          UPDATE_EMAIL_TO: ${{ secrets.UPDATE_EMAIL_TO }}
        run: |
          if [ -n "$SMTP_SERVER" ] && [ -n "$SMTP_USERNAME" ] && [ -n "$SMTP_PASSWORD" ] && [ -n "$UPDATE_EMAIL_TO" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Email update notice
        if: steps.auto-commit.outputs.changes_detected == 'true' && steps.email-config.outputs.enabled == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT || '587' }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Schwarzman Network data refreshed"
          to: ${{ secrets.UPDATE_EMAIL_TO }}
          from: ${{ secrets.UPDATE_EMAIL_FROM || secrets.SMTP_USERNAME }}
          body: |
            The yearly Schwarzman Network data refresh completed and pushed an update to main.

            Repository: ${{ github.repository }}
            Commit: ${{ github.sha }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Create GitHub notification fallback
        if: steps.auto-commit.outputs.changes_detected == 'true' && steps.email-config.outputs.enabled != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = "Schwarzman Network data refreshed";
            const body = [
              `@${context.repo.owner} the yearly Schwarzman Network data refresh completed and pushed an update to main.`,
              "",
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Commit: ${context.sha}`
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
